skip-check:
  - CKV_ARGO_2
  - CKV_DOCKER_2
  # Base64 High Entropy String - flags on the local-dev/test-only placeholder credentials in
  # compose.yaml and appsettings.Development.json (e.g. "vfps-web-secret", "vfps-minio-secret").
  # These aren't real secrets and inline `checkov:skip` comments don't suppress secrets-scan
  # findings (verified locally - only IaC resource checks respect that annotation), so this is
  # the only way to silence the false positive.
  - CKV_SECRET_6
