name: benchmarks

on:
  push:
    tags:
      - "v*"
    branches: [master]
    paths:
      - src/**
  pull_request:
    branches: [master]
    paths:
      - src/**
  # merge_group doesn't support path filtering, unlike push/pull_request above - this will run
  # on every merge-queue check regardless of whether src/** changed.
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    name: benchmark
    permissions:
      contents: write
      pages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.302"

      - name: Run benchmark
        run: dotnet run -c Release --project=src/Vfps.Benchmarks

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: PseudonymGeneratorBenchmarks
          tool: "benchmarkdotnet"
          output-file-path: BenchmarkDotNet.Artifacts/results/Vfps.Benchmarks.PseudonymGeneratorBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Without this, a merge_group run fails with "No commit found for SHA:
          # refs/heads/gh-readonly-queue/master/pr-<n>-<sha>". The action's own commit-lookup
          # (dist/src/extract.js's getCommit()) only special-cases the push event's head_commit
          # payload and the pull_request event's pull_request payload; merge_group has neither, so
          # it falls back to a GitHub API call using github.context.ref - which for a merge_group
          # run is that gh-readonly-queue ref string, not a resolvable commit reference. Passing
          # this `ref` input short-circuits that fallback with the real commit SHA instead (a
          # merge_group run's github.sha is the actual, API-resolvable temporary merge commit).
          # A no-op for push/pull_request runs - getCommit() never reaches this input for those,
          # since the head_commit/pull_request payload checks return first.
          ref: ${{ github.sha }}
          # Explicit allow-list, not "!= pull_request" - a merge_group run validates a speculative
          # merge commit before it actually lands, so it shouldn't push benchmark data either.
          auto-push: ${{ github.event_name == 'push' }}
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: true
