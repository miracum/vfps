services:
  postgresql:
    image: docker.io/library/postgres:18.3@sha256:69e8582b781cb44fa4557b98ed586fe68361e320d9b12f9707494335634f4f3d
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 1g
    ipc: private
    security_opt:
      - "no-new-privileges:true"
    privileged: false
    environment:
      # kics-scan ignore-line
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vfps
    ports:
      - "127.0.0.1:35432:5432"

  jaeger:
    image: docker.io/jaegertracing/all-in-one:1.76.0@sha256:ab6f1a1f0fb49ea08bcd19f6b84f6081d0d44b364b6de148e1798eb5816bacac
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 1g
    cap_drop:
      - ALL
    ipc: none
    security_opt:
      - "no-new-privileges:true"
    privileged: false
    profiles:
      - jaeger
    ports:
      - "6831:6831/udp"
      - "127.0.0.1:16686:16686"

  redis:
    image: docker.io/library/redis:8-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 256m
    cap_drop:
      - ALL
    ipc: none
    security_opt:
      - "no-new-privileges:true"
    privileged: false
    profiles:
      - keycloak
    ports:
      - "127.0.0.1:6379:6379"

  # Local OIDC provider for testing Authorization:IsEnabled=true. Imports tests/keycloak/vfps-realm.json,
  # which pre-configures the "vfps-web" client and two users: admin/admin (realm role vfps-admin) and
  # reader/reader (realm role vfps-ns-development-read). Not started by default - requires the
  # "keycloak" compose profile.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start-dev --import-realm
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 1g
    security_opt:
      - "no-new-privileges:true"
    privileged: false
    environment:
      KEYCLOAK_ADMIN: admin
      # kics-scan ignore-line
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./tests/keycloak/vfps-realm.json:/opt/keycloak/data/import/vfps-realm.json:ro
    profiles:
      - keycloak
    ports:
      - "127.0.0.1:8180:8080"

  # Local S3-compatible object storage for testing S3__IsEnabled=true (CSV pseudonymization
  # jobs). Not started by default - requires the "s3" compose profile.
  minio:
    image: quay.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 512m
    security_opt:
      - "no-new-privileges:true"
    privileged: false
    environment:
      MINIO_ROOT_USER: vfps
      # kics-scan ignore-line
      MINIO_ROOT_PASSWORD: vfps-minio-secret
    profiles:
      - s3
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  # One-shot sidecar that creates the "vfps-csv-jobs" bucket vfps uploads/downloads CSV job
  # files to/from, then exits - MinIO itself doesn't auto-create buckets.
  minio-create-bucket:
    image: quay.io/minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 vfps vfps-minio-secret; do sleep 1; done;
      mc mb --ignore-existing local/vfps-csv-jobs;
      "
    profiles:
      - s3

  vfps:
    image: ghcr.io/miracum/vfps:${VFPS_IMAGE_TAG:-v1.3.7} # x-release-please-version
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "1"
        reservations:
          memory: 128m
          cpus: "1"
    ipc: none
    cap_drop:
      - ALL
    read_only: true
    privileged: false
    security_opt:
      - "no-new-privileges:true"
    profiles:
      - test
    environment:
      COMPlus_EnableDiagnostics: "0"
      ForceRunDatabaseMigrations: "true"
      ConnectionStrings__PostgreSQL: "Host=postgresql:5432;Database=vfps;Timeout=60;Max Auto Prepare=5;Application Name=vfps;Maximum Pool Size=50;"
      PGUSER: postgres
      # kics-scan ignore-line
      PGPASSWORD: postgres
      # Only takes effect when Authorization__IsEnabled=true is also set (e.g. for manually
      # testing against the "keycloak" profile above) - off by default, see README.
      ConnectionStrings__Redis: "redis:6379"
      Authorization__Authority: "http://keycloak:8080/realms/vfps"
      Authorization__ClientId: "vfps-web"
      # kics-scan ignore-line
      Authorization__ClientSecret: "vfps-web-secret"
      Authorization__AdminRoles__0: "vfps-admin"
      Authorization__NamespaceRules__0__Namespace: "development"
      Authorization__NamespaceRules__0__ReadRoles__0: "vfps-ns-development-read"
      # Only takes effect when S3__IsEnabled=true is also set (e.g. for manually testing
      # against the "s3" profile above) - off by default, see README.
      S3__ServiceUrl: "http://minio:9000"
      S3__AccessKey: "vfps"
      # kics-scan ignore-line
      S3__SecretKey: "vfps-minio-secret"
      S3__Bucket: "vfps-csv-jobs"
      S3__ForcePathStyle: "true"
    ports:
      # Http1, Http2, Http3
      - "127.0.0.1:8080:8080"
      # Http2-only for plaintext gRPC
      - "127.0.0.1:8081:8081"
